<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>趋势分析 · 青少年心理画像与风险预警系统</title>
    <link rel="stylesheet" href="./styles.css?v=20260416b" />
  </head>
  <body>
    <div class="page-shell">
      <header class="masthead compact">
        <div class="masthead-copy">
          <div class="brand-row">
            <span class="brand-mark">势</span>
            <p class="eyebrow">时间维度与群体比较分析</p>
          </div>
          <h1>趋势分析</h1>
          <p class="lede">
            补充系统的时间维度与群体比较结果，用于展示发帖活跃度变化和高风险群体的行为差异。
          </p>
        </div>

        <div class="masthead-side">
          <div class="api-card">
            <span class="api-label">系统连接状态</span>
            <strong id="api-base-value" class="api-value">等待解析…</strong>
            <p id="backend-status" class="status-line">正在准备连接后端…</p>
          </div>

          <div class="header-actions">
            <button id="refresh-button" class="button primary" type="button">刷新趋势</button>
            <button id="reset-api-button" class="button subtle" type="button">重置接口地址</button>
          </div>
        </div>
      </header>

      <nav class="nav-strip" aria-label="系统导航">
        <a class="nav-link" href="./index.html">总览大屏</a>
        <a class="nav-link" href="./alerts.html">风险预警</a>
        <a class="nav-link" href="./profile.html">个体画像</a>
        <a class="nav-link active" href="./trends.html">趋势分析</a>
        <a class="nav-link" href="./inference.html">文本研判</a>
      </nav>

      <main class="workspace workspace-two-column">
        <aside class="panel control-panel">
          <div class="panel-heading">
            <p class="panel-kicker">分析参数</p>
            <h2>时间与风险筛选</h2>
            <p>趋势结果会跟随风险阈值变化自动刷新。</p>
          </div>

          <label class="field">
            <span>神经质阈值 <strong id="neuro-value">0.70</strong></span>
            <input id="neuro-slider" type="range" min="0" max="1" step="0.01" value="0.70" />
          </label>

          <label class="field">
            <span>外向性上限 <strong id="extra-value">0.35</strong></span>
            <input id="extra-slider" type="range" min="0" max="1" step="0.01" value="0.35" />
          </label>

          <div class="helper-box">
            <strong>页面定位</strong>
            <p>本页重点补充答辩中提到的时间维度与群体行为差异，不承担单用户细查任务。</p>
          </div>
        </aside>

        <section class="main-column">
          <section class="panel">
            <div class="panel-heading">
              <p class="panel-kicker">时间维度</p>
              <h2>月度活跃趋势</h2>
              <p>展示总体发帖量、高风险用户发帖量以及活跃用户数量的月度变化。</p>
            </div>
            <div id="timeline-chart" class="timeline-chart"></div>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <p class="panel-kicker">群体比较</p>
              <h2>风险群体行为差异</h2>
              <p>比较高风险群体与相对稳定群体在发帖频率和夜间活跃度上的差异。</p>
            </div>
            <div id="group-comparison" class="comparison-grid"></div>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="./trends.js?v=20260416b"></script>
  </body>
</html>
